<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" role="img" aria-label="Panneau Iris Lorrain">
  <defs>
    <linearGradient id="bg-iris" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf6ef"/>
      <stop offset="100%" stop-color="#e9dfc9"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d9b382"/>
      <stop offset="100%" stop-color="#c97b5a"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2f6e57"/>
      <stop offset="100%" stop-color="#12352a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg-iris)"/>
  <rect x="30" y="30" width="540" height="740" fill="#1a1a18" rx="6"/>
  <rect x="40" y="40" width="520" height="720" fill="url(#sky)" rx="4"/>
  <!-- grille plomb -->
  <g stroke="#1a1a18" stroke-width="4" fill="none">
    <path d="M40 260 L560 260"/>
    <path d="M40 500 L560 500"/>
    <path d="M300 40 L300 760"/>
  </g>
  <!-- iris stylisés -->
  <g fill="url(#leaf)" stroke="#1a1a18" stroke-width="3">
    <path d="M180 740 Q 200 500 170 330 Q 150 220 200 80 Q 250 220 230 330 Q 200 500 220 740 Z"/>
    <path d="M420 740 Q 400 500 430 330 Q 450 220 400 80 Q 350 220 370 330 Q 400 500 380 740 Z"/>
  </g>
  <g fill="#a05438" stroke="#1a1a18" stroke-width="3">
    <ellipse cx="200" cy="120" rx="40" ry="70"/>
    <ellipse cx="400" cy="120" rx="40" ry="70"/>
  </g>
  <g fill="#d9b382" stroke="#1a1a18" stroke-width="2">
    <circle cx="200" cy="130" r="18"/>
    <circle cx="400" cy="130" r="18"/>
  </g>
</svg>
